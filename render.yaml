databases:
  - name: givecare-db
    databaseName: givecare
    user: givecare_user
    plan: free
    region: singapore

services:
  - type: web
    name: givecare-frontend
    env: static
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: givecare-backend
          property: hostport

  - type: web
    name: givecare-backend
    env: python
    buildCommand: pip install uv && uv sync
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: givecare-db
          property: connectionString
      - key: RENDER
        value: "true"